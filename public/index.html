<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Local OpenAI Chat</title>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <style>
      body {
        margin: 0;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
        display: flex;
        flex-direction: column;
        height: 100vh;
      }

      header {
        padding: 0.75rem 1rem;
        background: #111827;
        color: #f9fafb;
        font-size: 0.95rem;
      }

      #chat-container {
        flex: 1;
        display: flex;
        flex-direction: column;
        padding: 1rem;
        gap: 0.75rem;
        background: #f3f4f6;
      }

      #messages {
        flex: 1;
        overflow-y: auto;
        padding: 0.75rem;
        background: #ffffff;
        border-radius: 0.5rem;
        border: 1px solid #e5e7eb;
        font-size: 0.9rem;
      }

      .message {
        margin-bottom: 0.75rem;
        line-height: 1.4;
      }

      .message-user {
        color: #111827;
      }

      .message-assistant {
        color: #065f46;
      }

      .message strong {
        display: inline-block;
        width: 4rem;
      }

      #input-row {
        display: flex;
        gap: 0.5rem;
        align-items: flex-end;
      }

      #message-input {
        flex: 1;
        min-height: 3rem;
        max-height: 8rem;
        padding: 0.5rem 0.6rem;
        border-radius: 0.5rem;
        border: 1px solid #d1d5db;
        resize: vertical;
        font-family: inherit;
        font-size: 0.9rem;
      }

      #send-button {
        padding: 0.6rem 1.1rem;
        border-radius: 0.5rem;
        border: none;
        background: #2563eb;
        color: white;
        font-size: 0.9rem;
        cursor: pointer;
      }

      #send-button:disabled {
        background: #9ca3af;
        cursor: default;
      }

      #status {
        font-size: 0.8rem;
        color: #6b7280;
        min-height: 1.2rem;
      }
    </style>
  </head>
  <body>
    <header>
      Local OpenAI Chat (proxied via Node/Express)
    </header>

    <main id="chat-container">
      <div id="messages" aria-live="polite"></div>

      <div id="status"></div>

      <div id="input-row">
        <textarea
          id="message-input"
          placeholder="Type a message and press Enter or click Send..."
        ></textarea>
        <button id="send-button" type="button">Send</button>
      </div>
    </main>

    <script>
      const messagesEl = document.getElementById('messages');
      const inputEl = document.getElementById('message-input');
      const sendButton = document.getElementById('send-button');
      const statusEl = document.getElementById('status');

      function appendMessage(role, text) {
        const div = document.createElement('div');
        div.className = `message message-${role}`;
        const label = role === 'user' ? 'You' : 'Assistant';
        div.innerHTML = `<strong>${label}:</strong> ${text
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/\n/g, '<br>')}`;
        messagesEl.appendChild(div);
        messagesEl.scrollTop = messagesEl.scrollHeight;
      }

      async function sendMessage() {
        const text = inputEl.value.trim();
        if (!text) return;

        appendMessage('user', text);
        inputEl.value = '';
        inputEl.focus();

        sendButton.disabled = true;
        inputEl.disabled = true;
        statusEl.textContent = 'Waiting for response...';

        try {
          const res = await fetch('/chat', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({ message: text }),
          });

          if (!res.ok) {
            const err = await res.json().catch(() => ({}));
            const msg = err.error || `Request failed with status ${res.status}`;
            appendMessage('assistant', `Error: ${msg}`);
          } else {
            const data = await res.json();
            appendMessage('assistant', data.reply || '(no reply)');
          }
        } catch (err) {
          appendMessage('assistant', 'Error calling server. Check console and server logs.');
          console.error(err);
        } finally {
          sendButton.disabled = false;
          inputEl.disabled = false;
          statusEl.textContent = '';
        }
      }

      sendButton.addEventListener('click', sendMessage);

      inputEl.addEventListener('keydown', (event) => {
        if (event.key === 'Enter' && !event.shiftKey) {
          event.preventDefault();
          sendMessage();
        }
      });
    </script>
  </body>
  </html>
