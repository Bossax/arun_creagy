<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      width: 280px;
      padding: 16px;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
    }
    h1 {
      font-size: 16px;
      margin-bottom: 12px;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 12px;
      background: #16213e;
      border-radius: 8px;
      margin-bottom: 12px;
    }
    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #ef4444;
    }
    .dot.connected { background: #22c55e; }
    .info {
      font-size: 12px;
      color: #888;
      margin-bottom: 8px;
    }
    .topic {
      font-family: monospace;
      font-size: 11px;
      background: #0f0f23;
      padding: 8px;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .actions {
      display: flex;
      gap: 8px;
    }
    .version {
      margin-top: 12px;
      font-size: 10px;
      color: #666;
      text-align: center;
    }
    button {
      flex: 1;
      padding: 8px 12px;
      border: none;
      border-radius: 6px;
      background: #4f46e5;
      color: white;
      cursor: pointer;
      font-size: 12px;
    }
    button:hover { background: #4338ca; }
    button.secondary {
      background: #374151;
    }
    button.secondary:hover { background: #4b5563; }
  </style>
</head>
<body>
  <h1>🔌 Claude Browser Proxy</h1>

  <div class="status">
    <div class="dot" id="statusDot"></div>
    <span id="statusText">Connecting...</span>
  </div>

  <div class="info">MQTT Topics:</div>
  <div class="topic">
    📥 claude/browser/command<br>
    📤 claude/browser/response
  </div>

  <div class="info">Server: ws://localhost:9001</div>

  <div class="actions">
    <button id="testBtn">Test Connection</button>
    <button id="reconnectBtn" class="secondary">Reconnect</button>
  </div>

  <div class="version" id="version"></div>

  <script src="popup.js"></script>
</body>
</html>
