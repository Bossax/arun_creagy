<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      color: #eee;
      height: 100vh;
      display: flex;
      flex-direction: column;
    }
    header { padding: 16px; border-bottom: 1px solid #333; }
    h1 { font-size: 16px; display: flex; justify-content: space-between; }
    .version { font-size: 11px; color: #888; font-weight: normal; }
    .status { display: flex; align-items: center; gap: 8px; margin-top: 8px; font-size: 12px; }
    .dot { width: 8px; height: 8px; border-radius: 50%; background: #ef4444; }
    .dot.on { background: #22c55e; }
    .page { padding: 12px 16px; background: #16213e; border-bottom: 1px solid #333; font-size: 12px; }
    .page .url { color: #666; word-break: break-all; margin-top: 4px; font-size: 11px; }
    .state-row { padding: 8px 16px; background: #0a0a1a; border-bottom: 1px solid #333; display: flex; align-items: center; gap: 12px; font-size: 11px; }
    .state-label { color: #666; }
    .state-loading { font-size: 14px; }
    .state-tool { background: #1e3a5f; padding: 2px 8px; border-radius: 10px; color: #6bb3f0; }
    .state-tool.youtube { background: #333; color: #ccc; }
    .state-tool.search { background: #1e5f3a; color: #6bf06b; }
    .state-count { color: #888; margin-left: auto; }
    .logs { flex: 1; overflow-y: auto; padding: 8px; }
    .log { font-family: monospace; font-size: 11px; padding: 6px 8px; margin-bottom: 4px; background: #0f0f23; border-radius: 4px; word-break: break-all; }
    .log.cmd { border-left: 3px solid #4f46e5; }
    .log.res { border-left: 3px solid #22c55e; }
    .log.answer { border-left: 3px solid #f59e0b; background: #1c1c1c; }
    .log .t { color: #666; margin-right: 8px; }
    .log code { background: #1e1e2e; padding: 2px 6px; border-radius: 3px; font-size: 10px; }
    .log details { margin-top: 4px; }
    .log summary { cursor: pointer; color: #888; font-size: 10px; }
    .log summary:hover { color: #fff; }
    .log pre { margin: 8px 0 0 0; padding: 8px; background: #1e1e2e; border-radius: 4px; font-size: 10px; white-space: pre-wrap; word-break: break-all; }
    .answer-box { padding: 12px 16px; background: #0d1b2a; border-bottom: 1px solid #333; max-height: 400px; overflow-y: auto; flex-shrink: 0; }
    .answer-box h3 { font-size: 11px; color: #f59e0b; margin-bottom: 8px; text-transform: uppercase; letter-spacing: 0.5px; }
    .answer-box .text { font-size: 12px; line-height: 1.7; white-space: pre-wrap; word-wrap: break-word; color: #e0e0e0; }
    .btns { padding: 12px; border-top: 1px solid #333; display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px; }
    button { padding: 8px; border: none; border-radius: 6px; background: #374151; color: white; cursor: pointer; font-size: 11px; }
    button:hover { background: #4b5563; }
    button.p { background: #4f46e5; }
    .model-row { padding: 12px; border-top: 1px solid #333; display: flex; gap: 8px; align-items: center; }
    .model-row label { font-size: 11px; color: #888; }
    .model-btn { padding: 6px 12px; border: 1px solid #444; border-radius: 16px; background: transparent; color: #888; cursor: pointer; font-size: 11px; transition: all 0.2s; }
    .model-btn:hover { border-color: #666; color: #ccc; }
    .model-btn.active { background: #22c55e; border-color: #22c55e; color: #000; font-weight: bold; }
    .input-row { padding: 12px; border-top: 1px solid #333; display: flex; gap: 8px; }
    .input-row input { flex: 1; padding: 8px; border: 1px solid #333; border-radius: 6px; background: #0f0f23; color: #eee; font-size: 12px; }
    .input-row input:focus { outline: none; border-color: #4f46e5; }
    footer { padding: 8px 16px; border-top: 1px solid #333; font-size: 10px; color: #666; }
  </style>
</head>
<body>
  <header>
    <h1>Gemini Proxy <span class="version" id="v"></span></h1>
    <div class="status"><div class="dot" id="d"></div><span id="s">Checking...</span></div>
  </header>
  <div class="page"><strong id="pt">Loading...</strong><div class="url" id="pu"></div></div>
  <div class="state-row" id="sr">
    <span class="state-label">State:</span>
    <span class="state-loading" id="sl">⚪</span>
    <span class="state-tool" id="st">-</span>
    <span class="state-count" id="sc">0 responses</span>
  </div>
  <div class="answer-box" id="ab" style="display:none;">
    <h3>🤖 Gemini Response</h3>
    <div class="text" id="at">Waiting for response...</div>
  </div>
  <div class="logs" id="l"></div>
  <div class="input-row">
    <input type="text" id="inp" placeholder="Ask Gemini anything...">
    <button id="run" class="p">Ask</button>
  </div>
  <div class="model-row">
    <label>Model:</label>
    <button class="model-btn" data-model="fast">⚡ Fast</button>
    <button class="model-btn active" data-model="pro">🧠 Pro</button>
    <button class="model-btn" data-model="thinking">💭 Think</button>
  </div>
  <div class="btns">
    <button id="b1">Get URL</button>
    <button id="b2">Get Text</button>
    <button id="b3">Get HTML</button>
    <button id="b4">Videos</button>
    <button id="b5">Screenshot</button>
    <button id="b6">Clear</button>
    <button id="b7" class="p" style="grid-column: span 3;">📥 Get Gemini Response</button>
  </div>
  <footer>ws://localhost:9001 | <span id="vb"></span></footer>
  <script src="sidepanel.js"></script>
</body>
</html>
